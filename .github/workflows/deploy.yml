name: Deploy CVmanager

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    name: Trigger deploy webhook
    runs-on: ubuntu-latest

    steps:
      - name: Call deploy endpoint
        run: |
          curl -fsS -X POST "https://cvm.actlab.app/api/update-git" \
            -H "Accept: application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}"